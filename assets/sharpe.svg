<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14">
  <style>
    text { fill: #9ca3af; }
  </style>

  <text x="20" y="22" font-weight="600">Sharpe ratio, 2024 OOS, every seed:</text>

  <!-- seed 7: 1.79 -->
  <text x="20" y="52">seed  7</text>
  <rect x="100" y="40" width="0" height="14" fill="#6e7681">
    <animate attributeName="width" from="0" to="358" dur="1.5s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="510" y="52" opacity="0">1.79
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- seed 11: 1.73 (median) -->
  <text x="20" y="76">seed 11</text>
  <rect x="100" y="64" width="0" height="14" fill="#6e7681">
    <animate attributeName="width" from="0" to="346" dur="1.5s" begin="0.2s" fill="freeze"/>
    <animate attributeName="fill" from="#6e7681" to="#3fb950" dur="0.5s" begin="1.8s" fill="freeze"/>
  </rect>
  <text x="510" y="76" opacity="0">1.73
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>
  <text x="565" y="76" fill="#3fb950" opacity="0">&#8592; median
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
  </text>

  <!-- seed 13: 1.49 -->
  <text x="20" y="100">seed 13</text>
  <rect x="100" y="88" width="0" height="14" fill="#6e7681">
    <animate attributeName="width" from="0" to="298" dur="1.5s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="510" y="100" opacity="0">1.49
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- seed 17: 1.33 -->
  <text x="20" y="124">seed 17</text>
  <rect x="100" y="112" width="0" height="14" fill="#6e7681">
    <animate attributeName="width" from="0" to="266" dur="1.5s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="510" y="124" opacity="0">1.33
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- seed 19: 1.99 (best of 5) -->
  <text x="20" y="148">seed 19</text>
  <rect x="100" y="136" width="0" height="14" fill="#6e7681">
    <animate attributeName="width" from="0" to="398" dur="1.5s" begin="0.2s" fill="freeze"/>
    <animate attributeName="fill" from="#6e7681" to="#f85149" dur="0.5s" begin="2.0s" fill="freeze"/>
  </rect>
  <text x="510" y="148" opacity="0">1.99
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>
  <text x="565" y="148" fill="#f85149" opacity="0">&#8592; best of 5, cherry-pick
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.3s" fill="freeze"/>
  </text>

  <!-- divider -->
  <line x1="20" y1="170" x2="690" y2="170" stroke="#30363d" stroke-width="1"/>

  <!-- SPY: 1.87 -->
  <text x="20" y="196">SPY</text>
  <rect x="100" y="184" width="0" height="14" fill="#58a6ff" opacity="0.6">
    <animate attributeName="width" from="0" to="374" dur="1.5s" begin="0.2s" fill="freeze"/>
  </rect>
  <text x="510" y="196" opacity="0">1.87
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.6s" fill="freeze"/>
  </text>
  <text x="565" y="196" fill="#58a6ff" opacity="0">&#8592; benchmark
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.0s" fill="freeze"/>
  </text>
</svg>
